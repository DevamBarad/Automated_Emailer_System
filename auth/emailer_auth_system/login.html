
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - AutoMailer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4; -webkit-backdrop-filter: blur(5px);
    margin: 0;
    padding: 0;
    backdrop-filter: blur(5px);
  }
  .container {
    width: 300px;
    margin: 100px auto;
    padding: 20px;
    background-color: #fff;
    border-radius: 5px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }
  h2 {
    text-align: center;
    margin-bottom: 20px;
  }
  h2:hover{
    filter: blur(1px);
  }
  input[type="email"],
  input[type="password"] {
    width: calc(100% - 20px);
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
  }

  button {
    width: 100%;
    padding: 10px;
    background-color: #4400ff;
    color: white;
    border: none;
    border-radius: 9px;
    cursor: pointer;
  }
  button:hover {
    transition-duration: 1s;
    background-color: #0303c1;
  }

</style>
<body>
  <div class="container">
    <h2>Login</h2>
    <form action="php/login.php" method="POST">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="register.html">Register here</a></p>
  </div>
</body>
</html>
